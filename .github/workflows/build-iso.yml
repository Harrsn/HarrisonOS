# ============================================================================
# HarrisonOS — GitHub Actions CI Pipeline
# Automatically builds the ISO on push to main or on tag creation
# ============================================================================

name: Build HarrisonOS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Free up disk space ────────────────────────────────────────────
      # GitHub runners have limited space; we need ~15-20 GB
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /

          # Remove unnecessary pre-installed software
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # Clean apt cache
          sudo apt-get clean

          echo "=== Disk space after cleanup ==="
          df -h /

      # ── Install dependencies ──────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      # ── Setup live-build ──────────────────────────────────────────────
      - name: Run setup script
        run: |
          chmod +x setup.sh
          ./setup.sh

      # ── Build the ISO ─────────────────────────────────────────────────
      - name: Build ISO
        run: |
          cd build
          sudo lb build 2>&1 | tee build.log

          # Show build result
          echo "=== Build complete ==="
          ls -lh *.iso 2>/dev/null || echo "No ISO found — check build.log"
          echo "=== Disk usage ==="
          df -h /

      # ── Upload build log (always, for debugging) ──────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 7

      # ── Upload ISO as artifact (on push to main) ──────────────────────
      - name: Upload ISO artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: HarrisonOS-ISO
          path: build/*.iso
          retention-days: 14
          compression-level: 0  # ISO is already compressed

      # ── Create GitHub Release (on tag push) ───────────────────────────
      - name: Get ISO filename
        if: startsWith(github.ref, 'refs/tags/')
        id: iso
        run: |
          ISO_FILE=$(ls build/*.iso 2>/dev/null | head -1)
          if [[ -n "$ISO_FILE" ]]; then
            echo "path=$ISO_FILE" >> "$GITHUB_OUTPUT"
            echo "name=$(basename $ISO_FILE)" >> "$GITHUB_OUTPUT"
            echo "size=$(du -h $ISO_FILE | cut -f1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "HarrisonOS ${{ github.ref_name }}"
          body: |
            ## HarrisonOS ${{ github.ref_name }}

            **Base:** Debian Bookworm (stable)
            **Desktop:** KDE Plasma
            **Architecture:** amd64
            **ISO Size:** ${{ steps.iso.outputs.size }}

            ### What's included
            - KDE Plasma desktop with Breeze Dark theme
            - Full development environment (Python, Git, Docker, etc.)
            - Networking tools (Wireshark, nmap, WireGuard, etc.)
            - Multimedia suite (VLC, OBS, GIMP, Kdenlive, etc.)
            - LibreOffice, Flatpak (Flathub), and more

            ### How to use
            1. Download the ISO below
            2. Flash to USB: `sudo dd if=HarrisonOS-*.iso of=/dev/sdX bs=4M status=progress`
            3. Boot from USB
            4. Use the Calamares installer to install to disk

            Or test in a VM:
            ```bash
            qemu-system-x86_64 -m 4096 -cdrom HarrisonOS-*.iso -boot d -enable-kvm
            ```
          files: ${{ steps.iso.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Nightly build (scheduled) ───────────────────────────────────────────
  # Uncomment the schedule trigger below to enable nightly builds
  # on:
  #   schedule:
  #     - cron: '0 4 * * 1'  # Every Monday at 4am UTC
